name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: mac
            arch: arm64
          - os: macos-13
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js (standalone)
        run: npx next build

      - name: Copy static assets into standalone
        shell: bash
        run: |
          cp -R .next/static .next/standalone/.next/static
          cp -R public .next/standalone/public

      - name: Copy native modules into standalone
        shell: bash
        run: |
          cp -R node_modules/better-sqlite3 .next/standalone/node_modules/better-sqlite3
          cp -R node_modules/bindings .next/standalone/node_modules/bindings 2>/dev/null || true
          cp -R node_modules/file-uri-to-path .next/standalone/node_modules/file-uri-to-path 2>/dev/null || true

      - name: Resolve symlinks in standalone
        shell: bash
        run: |
          # Next.js standalone creates symlinks that electron-builder can't follow
          find .next/standalone -type l | while read link; do
            target=$(readlink "$link")
            resolved=$(cd "$(dirname "$link")" && realpath "$target" 2>/dev/null || echo "")
            if [ -n "$resolved" ] && [ -e "$resolved" ]; then
              rm "$link"
              cp -R "$resolved" "$link"
              echo "Resolved: $link"
            fi
          done

      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }} --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CardCanvas-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
